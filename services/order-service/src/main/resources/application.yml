server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/order_db
    username: order_user
    password: order_pass
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

client:
  inventory:
    base-url: http://localhost:8081
  payment:
    base-url: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
