server:
  port: ${PORT:8081}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/inventory_db}
    username: ${DB_USERNAME:inventory_user}
    password: ${DB_PASSWORD:inventory_pass}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
  sql:
    init:
      mode: ${SQL_INIT_MODE:always}

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  demo:
    username: ${DEMO_USERNAME:alexjoy}
    password: ${DEMO_PASSWORD:change-me}
  jwt:
    secret: ${JWT_SECRET:alexjoy-order-platform-secret-key-1234567890-super}
    expiration-seconds: ${JWT_EXP_SECONDS:3600}
